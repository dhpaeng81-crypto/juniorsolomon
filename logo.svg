<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 210" width="210" height="210" role="img" aria-label="주니어솔로몬 로고">
  <title>주니어솔로몬</title>

  <defs>
    <clipPath id="logo-circ">
      <circle cx="108" cy="102" r="86"/>
    </clipPath>
    <path id="logo-arc" d="M 26 102 A 82 82 0 0 1 190 102"/>
  </defs>

  <!-- Main circle background -->
  <circle cx="108" cy="102" r="86" fill="#C4B3DC"/>

  <!-- Bookshelf — upper right, clipped inside circle -->
  <g clip-path="url(#logo-circ)">
    <!-- Shelf casing -->
    <rect x="152" y="26" width="48" height="108" rx="2" fill="#C49558"/>
    <!-- Shelf horizontal dividers -->
    <rect x="152" y="26" width="48" height="5" fill="#96661E"/>
    <rect x="152" y="80" width="48" height="5" fill="#96661E"/>
    <!-- Upper shelf books -->
    <rect x="155" y="31" width="11" height="49" rx="1" fill="#3D1F6E"/>
    <rect x="168" y="36" width="9"  height="44" rx="1" fill="#5A2D90"/>
    <rect x="179" y="31" width="18" height="49" rx="1" fill="#4A2580"/>
    <!-- Lower shelf books -->
    <rect x="155" y="85" width="9"  height="44" rx="1" fill="#5A2D90"/>
    <rect x="166" y="90" width="11" height="39" rx="1" fill="#3D1F6E"/>
    <rect x="179" y="85" width="18" height="44" rx="1" fill="#4A2580"/>
  </g>

  <!-- Circle border (above bookshelf) -->
  <circle cx="108" cy="102" r="86" fill="none" stroke="#5A2D8E" stroke-width="4.5"/>

  <!-- Arched text -->
  <text font-family="'Pretendard Variable','Pretendard','Apple SD Gothic Neo',sans-serif"
        font-size="11.5" font-weight="700" fill="#5A2D8E" letter-spacing="1.5">
    <textPath href="#logo-arc" startOffset="50%" text-anchor="middle">지혜가 샘솟는 독서철학논술</textPath>
  </text>

  <!-- ── CROWN ── -->
  <!-- Left spike -->
  <polygon points="76,72 85,48 94,72" fill="#F0C820"/>
  <!-- Middle spike (tallest) -->
  <polygon points="92,72 108,40 124,72" fill="#E8B810"/>
  <!-- Right spike -->
  <polygon points="122,72 131,48 140,72" fill="#F0C820"/>
  <!-- Crown band -->
  <rect x="74" y="68" width="68" height="17" rx="3" fill="#F0C820"/>
  <rect x="74" y="73" width="68" height="9"  fill="#D4A010"/>
  <!-- Crown gems (3 circles on band) -->
  <circle cx="91"  cy="77" r="4.5" fill="#3D1F6E" stroke="#2D0F54" stroke-width="1"/>
  <circle cx="108" cy="77" r="4.5" fill="#3D1F6E" stroke="#2D0F54" stroke-width="1"/>
  <circle cx="125" cy="77" r="4.5" fill="#3D1F6E" stroke="#2D0F54" stroke-width="1"/>
  <!-- Crown top orb -->
  <circle cx="108" cy="40" r="5.5" fill="none" stroke="#5A2D8E" stroke-width="2.5"/>
  <circle cx="108" cy="40" r="2.2" fill="#5A2D8E"/>

  <!-- ── BEARD (rendered before face so face sits on top) ── -->
  <path d="M84 104
           Q74 120 76 136
           Q84 158 108 161
           Q132 158 140 136
           Q142 120 132 104
           Q121 113 108 115
           Q95 113 84 104Z"
        fill="#FAFAF8" stroke="#E8E2DC" stroke-width="0.8"/>
  <!-- Wavy beard bottom edge -->
  <path d="M82 150 Q86 157 90 150 Q94 157 98 150 Q102 157 106 150
           Q110 157 114 150 Q118 157 122 150 Q126 157 130 150"
        fill="none" stroke="#DDD8D2" stroke-width="1.5"/>

  <!-- ── FACE ── -->
  <ellipse cx="108" cy="96" rx="22" ry="24" fill="#F5DFC8"/>
  <!-- Eyebrows -->
  <path d="M92 88 Q97 84 102 88" stroke="#5A2D8E" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M114 88 Q119 84 124 88" stroke="#5A2D8E" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- Eyes (dash style matching CI) -->
  <line x1="92"  y1="95" x2="101" y2="95" stroke="#3D1F6E" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="115" y1="95" x2="124" y2="95" stroke="#3D1F6E" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M97 106 Q108 115 119 106" stroke="#9B6848" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ── ROBE ── -->
  <path d="M84 104
           Q70 116 66 136 L66 172 L150 172 L150 136
           Q146 116 132 104
           Q121 113 108 115
           Q95 113 84 104Z"
        fill="#4A1E8E"/>
  <!-- Robe inner shadow / collar -->
  <path d="M84 104 Q95 113 108 115 Q121 113 132 104
           Q124 124 108 126 Q92 124 84 104Z"
        fill="#2D0F60"/>
  <!-- Robe lighter shoulder tone -->
  <path d="M84 104 Q77 110 74 118 Q82 112 95 113 Q95 113 84 104Z" fill="#5A2D8E" opacity="0.5"/>
  <path d="M132 104 Q139 110 142 118 Q134 112 121 113 Q121 113 132 104Z" fill="#5A2D8E" opacity="0.5"/>

  <!-- ── BOOK ── -->
  <!-- Left page -->
  <rect x="76" y="143" width="30" height="26" rx="2" fill="#F5EFE8" stroke="#D4C8B8" stroke-width="0.8"/>
  <!-- Right page -->
  <rect x="110" y="143" width="30" height="26" rx="2" fill="#F5EFE8" stroke="#D4C8B8" stroke-width="0.8"/>
  <!-- Spine -->
  <rect x="104" y="141" width="8" height="30" rx="2" fill="#C49020"/>
  <!-- Page lines left -->
  <line x1="80"  y1="150" x2="103" y2="150" stroke="#C0B4A0" stroke-width="1.2"/>
  <line x1="80"  y1="155" x2="103" y2="155" stroke="#C0B4A0" stroke-width="1.2"/>
  <line x1="80"  y1="160" x2="103" y2="160" stroke="#C0B4A0" stroke-width="1.2"/>
  <line x1="80"  y1="165" x2="103" y2="165" stroke="#C0B4A0" stroke-width="1.2"/>
  <!-- Page lines right -->
  <line x1="113" y1="150" x2="136" y2="150" stroke="#C0B4A0" stroke-width="1.2"/>
  <line x1="113" y1="155" x2="136" y2="155" stroke="#C0B4A0" stroke-width="1.2"/>
  <line x1="113" y1="160" x2="136" y2="160" stroke="#C0B4A0" stroke-width="1.2"/>
  <line x1="113" y1="165" x2="136" y2="165" stroke="#C0B4A0" stroke-width="1.2"/>

  <!-- ── THOUGHT BUBBLES (lower-left, part of CI design) ── -->
  <circle cx="38" cy="160" r="10" fill="#C4B3DC" stroke="#5A2D8E" stroke-width="2.5"/>
  <circle cx="25" cy="175" r="6"  fill="#C4B3DC" stroke="#5A2D8E" stroke-width="2"/>
</svg>
