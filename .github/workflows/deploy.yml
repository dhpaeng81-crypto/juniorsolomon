name: Deploy to Vercel

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        run: |
          echo "VERCEL_TOKEN set:      $([ -n "$VERCEL_TOKEN" ] && echo YES || echo NO - EMPTY)"
          echo "VERCEL_PROJECT_ID set: $([ -n "$VERCEL_PROJECT_ID" ] && echo YES || echo NO - EMPTY)"
          echo "VERCEL_ORG_ID set:     $([ -n "$VERCEL_ORG_ID" ] && echo YES || echo NO - EMPTY)"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          vercel --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
